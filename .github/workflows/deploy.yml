name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/projects/order
            git pull origin main
            sudo docker compose up --build -d
            sudo docker exec order-app php artisan migrate --force
            sudo docker exec order-app php artisan config:cache
            sudo docker exec order-app php artisan route:cache
            sudo docker exec order-app php artisan view:cache
