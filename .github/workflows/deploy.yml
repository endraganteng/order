name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: cd ~/projects/order && git pull origin main

      - name: Build and restart containers
        run: cd ~/projects/order && sudo docker compose up --build -d

      - name: Run migrations
        run: sudo docker exec order-app php artisan migrate --force

      - name: Cache config
        run: |
          sudo docker exec order-app php artisan config:cache
          sudo docker exec order-app php artisan route:cache
          sudo docker exec order-app php artisan view:cache
