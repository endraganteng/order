; PHP-FPM pool config — production tuned untuk VPS small/medium.
; Tweak pm.max_children kalau Anda monitor banyak 502 / timeout.

[www]
user = www-data
group = www-data

listen = 9000
listen.backlog = 511

; Process management — dynamic = scale antar min/max sesuai load
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
pm.process_idle_timeout = 30s

; Status page (opsional, bisa diakses internal untuk monitoring)
pm.status_path = /fpm-status
ping.path = /fpm-ping

; Logging ke stdout supaya `docker logs` jalan
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

; Slow log (request > 5 detik)
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; Environment variables: pass-through dari container env
clear_env = no
