; Production php.ini overrides untuk Laravel.
; File ini dimuat sebagai zz-app.ini supaya override defaults.

; ── Memory & timeout ────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
post_max_size = 50M
upload_max_filesize = 50M
max_file_uploads = 10

; ── Error handling (production: log, jangan tampilkan ke user) ──
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── OpCache (critical untuk performance Laravel) ────────────────
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.fast_shutdown = 1
opcache.save_comments = 1

; ── Session ─────────────────────────────────────────────────────
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = "Lax"

; ── Misc security ───────────────────────────────────────────────
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off

; ── Date ────────────────────────────────────────────────────────
date.timezone = Asia/Jakarta

; ── Realpath cache (filesystem speedup) ─────────────────────────
realpath_cache_size = 4096K
realpath_cache_ttl = 600
