# Nginx config untuk Laravel.
# - Serve public/ langsung
# - Forward .php request ke php-fpm via fastcgi
# - Health check endpoint /health (tidak melalui PHP, untuk healthcheck Docker)

server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 50M;

    # Health check internal (bypass PHP, untuk Docker healthcheck + Traefik)
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Asset caching — Vite build di public/build/* punya hash, bisa cache lama
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static assets dengan caching pendek
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Storage symlink (kalau pakai php artisan storage:link)
    location ^~ /storage/ {
        expires 1d;
        try_files $uri =404;
    }

    # Block direct access to .env, .git, dotfiles
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block PHP execution di public/storage/uploads (defense-in-depth)
    location ~* /storage/.*\.php$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_read_timeout 60s;
    }

    # Disable logging untuk favicon + robots noise
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt { access_log off; log_not_found off; }
}
